# Test scenarios for hosted-agents-v2-py skill evaluation
# Each scenario tests one refreshed hosted-agent pattern.

config:
  model: gpt-4
  max_tokens: 2500
  temperature: 0.3

scenarios:
  - name: protocol_selection
    prompt: |
      Explain which hosted-agent protocol to choose for common scenarios.
      Include Responses, Invocations, Activity, and A2A guidance.
    expected_patterns:
      - "Responses"
      - "Invocations"
      - "Default to Responses"
      - "Activity"
      - "A2A"
    forbidden_patterns:
      - "ImageBasedHostedAgentDefinition"
      - 'version="v1"'
      - "capability host"
    tags:
      - protocol
      - decision
    mock_response: |
      Default to Responses for conversational assistants, multi-turn chat, RAG,
      tools, streaming, and background work that fits the OpenAI-compatible
      Responses contract. Use Invocations for webhooks, arbitrary JSON,
      non-conversational processing, custom SSE, protocol bridges, and callers
      that cannot use the Responses payload shape. Activity is used for Teams
      and M365 channel integration, typically alongside Responses. A2A is used
      for agent-to-agent delegation. A single hosted agent can expose multiple
      protocols when each protocol is declared with version 1.0.0.

  - name: python_agent_framework_responses
    prompt: |
      Create a Python Microsoft Agent Framework hosted agent using the refreshed
      Responses protocol. Use FoundryChatClient and ResponsesHostServer.
    expected_patterns:
      - "from agent_framework import Agent"
      - "from agent_framework.foundry import FoundryChatClient"
      - "from agent_framework_foundry_hosting import ResponsesHostServer"
      - "FOUNDRY_PROJECT_ENDPOINT"
      - "AZURE_AI_MODEL_DEPLOYMENT_NAME"
      - 'default_options={"store": False}'
      - "ResponsesHostServer(agent).run()"
    forbidden_patterns:
      - "AzureAIAgentClient"
      - "ChatAgent"
      - "from_agent_framework"
      - "azure.ai.agentserver.agentframework"
    tags:
      - python
      - agent-framework
      - responses
    mock_response: |
      import os

      from agent_framework import Agent
      from agent_framework.foundry import FoundryChatClient
      from agent_framework_foundry_hosting import ResponsesHostServer
      from azure.identity import DefaultAzureCredential

      client = FoundryChatClient(
          project_endpoint=os.environ["FOUNDRY_PROJECT_ENDPOINT"],
          model=os.environ["AZURE_AI_MODEL_DEPLOYMENT_NAME"],
          credential=DefaultAzureCredential(),
      )

      agent = Agent(
          client=client,
          instructions="You are a helpful assistant.",
          default_options={"store": False},
      )

      ResponsesHostServer(agent).run()

  - name: byo_responses_protocol_host
    prompt: |
      Show a Python bring-your-own hosted agent that exposes the Responses
      protocol directly with the protocol library.
    expected_patterns:
      - "ResponsesAgentServerHost"
      - "@app.response_handler"
      - "CreateResponse"
      - "ResponseContext"
      - "TextResponse"
      - "context.get_input_text"
      - "app.run()"
    forbidden_patterns:
      - "from_langgraph"
      - "from_agent_framework"
      - "azure.ai.agentserver.langgraph"
    tags:
      - python
      - byo
      - responses
    mock_response: |
      import asyncio

      from azure.ai.agentserver.responses import (
          CreateResponse,
          ResponseContext,
          ResponsesAgentServerHost,
          TextResponse,
      )

      app = ResponsesAgentServerHost()

      @app.response_handler
      async def handle_response(
          request: CreateResponse,
          context: ResponseContext,
          cancellation_signal: asyncio.Event,
      ):
          user_text = await context.get_input_text()
          return TextResponse(context, request, text=f"Echo: {user_text}")

      app.run()

  - name: byo_invocations_protocol_host
    prompt: |
      Show a Python bring-your-own hosted agent that accepts arbitrary JSON on
      the Invocations protocol and returns a Starlette response.
    expected_patterns:
      - "InvocationAgentServerHost"
      - "@app.invoke_handler"
      - "Request"
      - "JSONResponse"
      - "await request.json()"
      - "app.run()"
    forbidden_patterns:
      - "return {\"response\""
      - "ResponsesAgentServerHost"
      - "agent_reference"
    tags:
      - python
      - byo
      - invocations
    mock_response: |
      from azure.ai.agentserver.invocations import InvocationAgentServerHost
      from starlette.requests import Request
      from starlette.responses import JSONResponse, Response

      app = InvocationAgentServerHost()

      @app.invoke_handler
      async def handle_invocation(request: Request) -> Response:
          payload = await request.json()
          message = payload.get("message", "")
          return JSONResponse({"response": f"Echo: {message}"})

      app.run()

  - name: deployment_yaml
    prompt: |
      Create hosted-agent deployment YAML for azd using the refreshed protocol
      version. Include one manifest and one agent.yaml example.
    expected_patterns:
      - "kind: hosted"
      - "protocol: responses"
      - "version: 1.0.0"
      - "AZURE_AI_MODEL_DEPLOYMENT_NAME"
      - "cpu:"
      - "memory:"
    forbidden_patterns:
      - "version: v1"
      - "FOUNDRY_PROJECT_ENDPOINT"
      - "APPLICATIONINSIGHTS_CONNECTION_STRING"
      - "tools:"
    tags:
      - yaml
      - deployment
      - azd
    mock_response: |
      agent.manifest.yaml:

      name: basic-responses-agent
      template:
        name: basic-responses-agent
        kind: hosted
        protocols:
          - protocol: responses
            version: 1.0.0
        environment_variables:
          - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
            value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
      resources:
        - kind: model
          id: gpt-4.1-mini
          name: AZURE_AI_MODEL_DEPLOYMENT_NAME

      agent.yaml:

      kind: hosted
      name: basic-responses-agent
      protocols:
        - protocol: responses
          version: 1.0.0
      resources:
        cpu: "0.25"
        memory: "0.5Gi"

  - name: python_sdk_deployment
    prompt: |
      Deploy a hosted agent version with the Python Azure AI Projects SDK on the
      refreshed preview. Expose both Responses and Invocations and show how to
      invoke with a dedicated agent-bound OpenAI client.
    expected_patterns:
      - "from azure.ai.projects import AIProjectClient"
      - "HostedAgentDefinition"
      - "ProtocolVersionRecord"
      - "AgentProtocol.RESPONSES"
      - "AgentProtocol.INVOCATIONS"
      - 'version="1.0.0"'
      - "allow_preview=True"
      - "get_openai_client(agent_name="
    forbidden_patterns:
      - "ImageBasedHostedAgentDefinition"
      - 'version="v1"'
      - "tools="
      - "agent_reference"
      - "capabilityHosts"
    tags:
      - python
      - sdk
      - deployment
    mock_response: |
      import os

      from azure.ai.projects import AIProjectClient
      from azure.ai.projects.models import (
          AgentProtocol,
          HostedAgentDefinition,
          ProtocolVersionRecord,
      )
      from azure.identity import DefaultAzureCredential

      project = AIProjectClient(
          endpoint=os.environ["AZURE_AI_PROJECT_ENDPOINT"],
          credential=DefaultAzureCredential(),
          allow_preview=True,
      )

      agent = project.agents.create_version(
          agent_name="my-hosted-agent",
          definition=HostedAgentDefinition(
              container_protocol_versions=[
                  ProtocolVersionRecord(protocol=AgentProtocol.RESPONSES, version="1.0.0"),
                  ProtocolVersionRecord(protocol=AgentProtocol.INVOCATIONS, version="1.0.0"),
              ],
              image="myregistry.azurecr.io/my-agent:v1",
              cpu="1",
              memory="2Gi",
              environment_variables={
                  "AZURE_AI_MODEL_DEPLOYMENT_NAME": os.environ["AZURE_AI_MODEL_DEPLOYMENT_NAME"],
              },
          ),
      )

      openai_client = project.get_openai_client(agent_name="my-hosted-agent")
      response = openai_client.responses.create(input="Hello!")
      print(response.output_text)

  - name: azd_workflow
    prompt: |
      Provide the azd workflow for creating, running, deploying, inspecting,
      invoking, monitoring, and cleaning up a hosted agent.
    expected_patterns:
      - "azd ext install azure.ai.agents"
      - "azd ai agent init"
      - "azd ai agent run"
      - "azd ai agent invoke --local"
      - "azd up"
      - "azd ai agent show"
      - "azd ai agent monitor"
      - "azd down"
    forbidden_patterns:
      - "az cognitiveservices agent"
      - "capabilityHosts"
      - "delete-deployment"
    tags:
      - cli
      - deployment
      - azd
    mock_response: |
      azd ext install azure.ai.agents
      azd ai agent init
      azd ai agent run
      azd ai agent invoke --local "Hello"
      azd up
      azd ai agent show --output table
      azd ai agent invoke "Hello"
      azd ai agent monitor --tail 20
      azd down

  - name: dotnet_protocol_packages
    prompt: |
      Summarize the C#/.NET package choices for hosted agents on the refreshed
      preview and mention the Agent Framework hosting extension names.
    expected_patterns:
      - "Azure.AI.AgentServer.Responses"
      - "Azure.AI.AgentServer.Invocations"
      - "Azure.AI.AgentServer.Core"
      - "Azure.Identity"
      - "AddFoundryResponses"
      - "MapFoundryResponses"
    forbidden_patterns:
      - "Azure.AI.AgentServer.AgentFramework"
      - 'version="v1"'
    tags:
      - dotnet
      - csharp
      - protocol
    mock_response: |
      For C# hosted agents, use Azure.AI.AgentServer.Responses for the
      Responses protocol and Azure.AI.AgentServer.Invocations for arbitrary
      JSON Invocations handlers. Azure.AI.AgentServer.Core is the shared
      hosting dependency, and Azure.Identity supplies Microsoft Entra
      authentication. For .NET Agent Framework hosting, use the Foundry
      hosting extensions and wire the ASP.NET app with AddFoundryResponses
      and MapFoundryResponses after confirming exact overloads against the
      installed package version.

  - name: migration_checklist
    prompt: |
      List the migration steps from the initial hosted-agent preview to the
      refreshed preview.
    expected_patterns:
      - "protocol libraries"
      - "version 1.0.0"
      - "HostedAgentDefinition"
      - "dedicated agent Entra identity"
      - "get_openai_client(agent_name="
      - "azd ai agent"
      - "active"
    forbidden_patterns:
      - "ImageBasedHostedAgentDefinition"
      - "agent_reference"
      - "capability host"
      - "az cognitiveservices agent"
      - 'version="v1"'
    tags:
      - migration
      - refreshed-preview
    mock_response: |
      Migrate to the refreshed preview by replacing framework adapters with
      protocol libraries, updating protocol declarations to version 1.0.0,
      using HostedAgentDefinition for direct SDK deployments, and routing
      Responses calls through get_openai_client(agent_name="my-hosted-agent").
      Update scripts to use azd ai agent commands, redeploy the container, and
      wait until the hosted agent version status is active. Review RBAC because
      runtime permissions now belong on the dedicated agent Entra identity,
      while the project managed identity is used for platform image pulls.
